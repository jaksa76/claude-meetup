services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: issue_reporting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/issue_reporting
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  client:
    build: ./client
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
